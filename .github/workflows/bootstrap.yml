name: Bootstrap and build GameHelp India

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gamehelp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore Astro project
        shell: bash
        run: |
          set -euo pipefail
          rm -f ci.yml vercel-deploy.yml
          cat > /tmp/project.b64 <<'PAYLOAD'
          
          PAYLOAD
          base64 --decode /tmp/project.b64 > /tmp/project.tar.gz
          echo "bf0f71620250c59791f05ccbd9a9c982f3a838c08026bea9762729ebf366ca43  /tmp/project.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/project.tar.gz -C "$GITHUB_WORKSPACE"
          test -f package.json
          test -f src/pages/index.astro
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies and create lock file
        run: npm install --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Build all Astro pages
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://gamehelp-india.vercel.app' }}
      - name: Commit complete project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi
          git commit -m "Bootstrap GameHelp India Astro pSEO portal"
          git push origin HEAD:main

  ci:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Detect bootstrapped project
        id: project
        shell: bash
        run: |
          if [[ -f package.json && -f package-lock.json ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Project is not bootstrapped yet. Run this workflow manually once."
          fi
      - uses: actions/setup-node@v4
        if: steps.project.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Install locked dependencies
        if: steps.project.outputs.ready == 'true'
        run: npm ci --no-audit --no-fund
      - name: Run tests
        if: steps.project.outputs.ready == 'true'
        run: npm test
      - name: Build Astro site
        if: steps.project.outputs.ready == 'true'
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://gamehelp-india.vercel.app' }}
      - name: Upload build artifact
        if: steps.project.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gamehelp-india-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
