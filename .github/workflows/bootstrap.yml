name: Bootstrap GameHelp India repository
on: { workflow_dispatch: {} }
permissions: { contents: write }
concurrency: { group: gamehelp-bootstrap, cancel-in-progress: false }
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Restore complete Astro project
        shell: bash
        run: |
          set -euo pipefail
          rm -f ci.yml vercel-deploy.yml
          cat > /tmp/project.b64 <<'PAYLOAD'
          
          PAYLOAD
          base64 --decode /tmp/project.b64 > /tmp/project.tar.gz
          echo "edd0bdae4395ed859d21ca80dd0f04b662b25dbdb45834f5a07a342369e53bdc  /tmp/project.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/project.tar.gz -C "$GITHUB_WORKSPACE"
          rm -f .github/workflows/bootstrap.yml
          test -f package.json
          test -f src/pages/index.astro
          test -f .github/workflows/ci.yml
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install dependencies and create lock file
        run: npm install --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Build all Astro pages
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://gamehelp-india.vercel.app' }}
      - name: Commit complete project to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Bootstrap GameHelp India Astro pSEO portal"
          git push origin HEAD:main
