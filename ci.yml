name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run safety and content tests
        run: npm test

      - name: Type-check and build Astro site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://gamehelp-india.vercel.app' }}

      - name: Upload static build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamehelp-india-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
